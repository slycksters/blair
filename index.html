<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blair</title>

  <link rel="icon" type="image/svg+xml" href="/blair/favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Primary SEO -->
  <meta name="title" content="Blair" />
  <meta
    name="description"
    content="Blair is a modern interactive web experience featuring guides, tools, and curated content."
  />
  <meta
    name="keywords"
    content="Blair, web app, tools, guides, dashboard, interactive site"
  />
  <meta name="author" content="Slyckster" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0f0f0f" />

  <!-- Canonical -->
  <link rel="canonical" href="https://YOUR-DOMAIN-HERE/" />

  <!-- Open Graph (Facebook / Discord / LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://YOUR-DOMAIN-HERE/" />
  <meta property="og:title" content="Blair" />
  <meta
    property="og:description"
    content="Blair is a modern interactive web experience featuring guides, tools, and curated content."
  />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Blair" />
  <meta
    name="twitter:description"
    content="Blair is a modern interactive web experience featuring guides, tools, and curated content."
  />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Redirect Script (GitHub Pages SPA fix) -->
  <script type="text/javascript">
    const redirect = sessionStorage.redirect;
    delete sessionStorage.redirect;
    if (redirect) {
      window.history.replaceState(null, null, redirect);
    }
  </script>
</head>
